<body>

    <h1>📚 Repaso: Inferencia Estadística</h1>
    
    <div class="controls">
        <button class="btn-shuffle" onclick="shuffleCards()">🔀 Barajar Tarjetas</button>
        <button class="btn-restore" onclick="restoreOrder()">⬇️ Orden Original</button>

    <div id="cards-container"></div>

    <script>
        const conceptos = [{"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Definici\u00f3n 1.1 (Vector Aleatorio Continuo)", "contenido": "Un vector aleatorio n-dimensional es una funci\u00f3n $X:\\Omega\\rightarrow\\mathbb{R}^{n}$, denotada por $X=(X_{1},X_{2},...,X_{n})$. Decimos que $X$ es continuo si existe una funci\u00f3n integrable no negativa $f_{X}:\\mathbb{R}^{n}\\rightarrow[0,\\infty)$, llamada Funci\u00f3n de Densidad Conjunta (FDC)."}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Definici\u00f3n 1.2 (Densidad Marginal)", "contenido": "Sea $(X, Y)$ un vector aleatorio con densidad conjunta $f_{X,Y}(x,y)$. La densidad marginal de $X$ se obtiene integrando sobre todo el rango de $Y$: $$f_{X}(x)=\\int_{-\\infty}^{\\infty}f_{X,Y}(x,y)dy$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Definici\u00f3n 1.3 (Densidad Condicional)", "contenido": "La densidad de $Y$ dado que ya observamos el evento $X=x$ se define como: $$f_{Y|X}(y|x)=\\frac{f_{X,Y}(x,y)}{f_{X}(x)}$$ si $f_{X}(x)>0$."}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 1.1 (Factorizaci\u00f3n por Independencia)", "contenido": "Las variables aleatorias $X_{1},...,X_{n}$ son mutuamente independientes si y solo si su densidad conjunta se factoriza como el producto de sus marginales: $$f_{X}(x_{1},...,x_{n})=\\prod_{i=1}^{n}f_{X_{i}}(x_{i})$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Definici\u00f3n 1.4 (Normal Multivariada)", "contenido": "Un vector aleatorio $X\\in\\mathbb{R}^{n}$ tiene una distribuci\u00f3n Normal Multivariada con media vector $\\mu$ y matriz de covarianza $\\Sigma$, denotado $X\\sim N_{n}(\\mu,\\Sigma)$. Su densidad es: $$f_{X}(x)=\\frac{1}{(2\\pi)^{n/2}|\\Sigma|^{1/2}}\\exp\\left(-\\frac{1}{2}(x-\\mu)^{T}\\Sigma^{-1}(x-\\mu)\\right)$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 1.2 (Propiedad de Transformaci\u00f3n Lineal)", "contenido": "Si $X\\sim N_{n}(\\mu,\\Sigma)$ y definimos $Y=AX+b$ (donde $A$ es una matriz de $m\\times n$), entonces: $$Y\\sim N_{m}(A\\mu+b,A\\Sigma A^{T})$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.1 (Cambio de Variable Univariado)", "contenido": "Sea $X$ una v.a. con densidad $f_{X}(x)$ y soporte $S_{X}$. Sea $Y=g(X)$ una transformaci\u00f3n tal que $g$ es mon\u00f3tona y diferenciable con inversa $x=g^{-1}(y)$. La densidad de $Y$ es: $$f_{Y}(y)=f_{X}(g^{-1}(y))\\left|\\frac{d}{dy}g^{-1}(y)\\right|$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.2 (Transformaci\u00f3n Multivariada)", "contenido": "Sean $X=(X_{1},...,X_{n})$ con densidad $f_{X}(x)$. Sea $Y=g(X)$ una transformaci\u00f3n biyectiva con inversa $x=h(y)$. La densidad conjunta de $Y$ es: $$f_{Y}(y)=f_{X}(h(y))\\cdot|J|$$ donde $|J|$ es el valor absoluto del determinante del Jacobiano de la inversa."}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Definici\u00f3n 2.1 (Estad\u00edsticas de Orden)", "contenido": "Dada una muestra aleatoria $X_{1},...,X_{n}$ las estad\u00edsticas de orden $X_{(1)},X_{(2)},...,X_{(n)}$ corresponden a los valores de la muestra ordenados de manera ascendente: $$X_{(1)}\\le X_{(2)}\\le...\\le X_{(n)}$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.3 (Densidad del M\u00e1ximo y M\u00ednimo)", "contenido": "Sea $X_{1},...,X_{n}$ una m.a. con densidad $f(x)$ y funci\u00f3n de distribuci\u00f3n $F(x)$.<ul><li>La densidad del M\u00e1ximo $X_{(n)}$ es: $f_{X_{(n)}}(x)=n[F(x)]^{n-1}f(x)$.</li><li>La densidad del M\u00ednimo $X_{(1)}$ es: $f_{X_{(1)}}(x)=n[1-F(x)]^{n-1}f(x)$.</li></ul>"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Definici\u00f3n 2.2 (Convergencia en Probabilidad)", "contenido": "Una sucesi\u00f3n de variables aleatorias $X_{1},X_{2},...$ converge en probabilidad a una variable $X$ (denotado $X_{n}\\xrightarrow{p} X$) si para todo $\\epsilon>0$: $$\\lim_{n\\rightarrow\\infty}\\mathbb{P}(|X_{n}-X|>\\epsilon)=0$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.4 (Ley D\u00e9bil de los Grandes N\u00fameros - WLLN)", "contenido": "Si $X_{1},...,X_{n}$ son i.i.d. con $\\mathbb{E}[X_{i}]=\\mu$ y $Var(X_{i})<\\infty$, entonces: $$\\overline{X}_{n}\\xrightarrow{p}\\mu$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.5 (Ley Fuerte de los Grandes N\u00fameros - LFGN)", "contenido": "Bajo las mismas condiciones, la convergencia es casi segura: $$\\mathbb{P}(\\lim_{n\\rightarrow\\infty}\\overline{X}_{n}=\\mu)=1$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.6 (Teorema del L\u00edmite Central)", "contenido": "Sea $X_{1},...,X_{n}$ una m.a. i.i.d. con media $\\mu$ y varianza finita $0<\\sigma^{2}<\\infty$. Definimos la variable estandarizada: $Z_{n}=\\frac{\\overline{X}_{n}-\\mu}{\\sigma/\\sqrt{n}}$. Entonces, $Z_{n}$ converge en distribuci\u00f3n a una Normal Est\u00e1ndar: $$Z_{n}\\xrightarrow{d} N(0,1) \\text{ cuando } n\\rightarrow\\infty$$"}, {"modulo": "M\u00f3dulo 0: El Puente Probabil\u00edstico", "titulo": "Teorema 2.7 (Propiedad de la FGM)", "contenido": "Si $M_{X}(t)=\\mathbb{E}[e^{tX}]$ existe en un entorno de cero, el k-\u00e9simo momento es: $$\\mathbb{E}[X^{k}]=\\frac{d^{k}}{dt^{k}}M_{X}(t)|_{t=0}$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 1.1 (Muestra Aleatoria i.i.d.)", "contenido": "Una muestra aleatoria de tama\u00f1o $n$ es un vector aleatorio $X=(X_{1},...,X_{n})^{T}$ donde las variables $X_{i}$ son independientes e id\u00e9nticamente distribuidas con densidad $f(x)$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 1.2 (Estad\u00edstico)", "contenido": "Un estad\u00edstico es cualquier funci\u00f3n medible $T:\\mathbb{R}^{n}\\rightarrow\\mathbb{R}^{k}$ de la muestra que no depende de par\u00e1metros desconocidos."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 1.3 (Estimador)", "contenido": "Un estimador es un estad\u00edstico utilizado espec\u00edficamente para inferir el valor de un par\u00e1metro poblacional $\\theta$: $$\\hat{\\theta}=T(X_{1},...,X_{n})$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 2.1 (Media Muestral)", "contenido": "El valor $c$ que minimiza la funci\u00f3n de costo cuadr\u00e1tico $Q(c)=\\sum_{i=1}^{n}(x_{i}-c)^{2}$ es la media muestral $\\overline{x}=\\frac{1}{n}\\sum x_{i}$.<br><br>\\textit{Nota (Identidad de Pit\u00e1goras Estad\u00edstica):} $\\sum_{i=1}^{n}(x_{i}-c)^{2}=\\sum_{i=1}^{n}(x_{i}-\\overline{x})^{2}+\\sum_{i=1}^{n}(\\overline{x}-c)^{2}$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 2.2 (Propiedades de la Media Muestral)", "contenido": "Sea $X_{1},...,X_{n}$ una muestra aleatoria con media $\\mu$ y varianza $\\sigma^{2}$. Entonces: $\\mathbb{E}[\\overline{X}]=\\mu$ y $Var(\\overline{X})=\\frac{\\sigma^{2}}{n}$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 2.3 (Mediana Muestral)", "contenido": "El valor $c$ que minimiza la funci\u00f3n de costo absoluto $A(c)=\\sum_{i=1}^{n}|x_{i}-c|$ es la mediana muestral $\\tilde{x}$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 3.1 (Varianza Muestral)", "contenido": "La varianza es la norma al cuadrado del vector de residuos, normalizada por la dimensi\u00f3n de su subespacio: $$S^{2}=\\frac{1}{n-1}\\sum_{i=1}^{n}(x_{i}-\\overline{x})^{2}$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 3.2 (Desviaci\u00f3n Est\u00e1ndar)", "contenido": "Es la ra\u00edz cuadrada positiva de la varianza: $S=\\sqrt{S^{2}}$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 3.1 (Insesgamiento de $S^{2}$)", "contenido": "La varianza muestral cumple que: $\\mathbb{E}[S^{2}]=\\sigma^{2}$ (Es un estimador insesgado)."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 3.2 (Transformaci\u00f3n de Media y Varianza)", "contenido": "Sea $Y_{i}=aX_{i}+b$. Entonces: $\\overline{Y}=a\\overline{X}+b$, $S_{Y}^{2}=a^{2}S_{X}^{2}$ y $S_{Y}=|a|S_{X}$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 4.1 (Glivenko-Cantelli)", "contenido": "La Funci\u00f3n de Distribuci\u00f3n Acumulada Emp\u00edrica $\\hat{F}_{n}(t)$ converge uniformemente a la verdadera distribuci\u00f3n $F(t)$ cuando $n\\rightarrow\\infty$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Teorema 4.2 (Desigualdad DKW)", "contenido": "Para cualquier $\\epsilon>0$: $$\\mathbb{P}(\\sup_{x}|\\hat{F}_{n}(x)-F(x)|>\\epsilon)\\le2e^{-2n\\epsilon^{2}}$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 4.1 (Histograma)", "contenido": "Es una funci\u00f3n escalonada $f_{n}(x)$ definida sobre intervalos $B_{i}$ de ancho $h$: $$f_{n}(x)=\\frac{\\text{Frecuencia en } B_{j}}{n\\cdot h}$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 4.2 (Estad\u00edsticas de Orden)", "contenido": "Denotamos a las variables ordenadas como $X_{(1)}\\le X_{(2)}\\le\\cdot\\cdot\\cdot\\le X_{(n)}$, donde $X_{(1)}=\\min(X_{i})$ y $X_{(n)}=\\max(X_{i})$."}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 4.3 (Cuantil Muestral $q_{p}$)", "contenido": "Para una probabilidad $p\\in(0,1)$, el cuantil de orden $p$ es: $$\\hat{q}_{p}=\\hat{F}_{n}^{-1}(p)=\\inf\\{x:\\hat{F}_{n}(x)\\ge p\\}$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 4.4 (Rango Intercuartil - IQR)", "contenido": "$$IQR=Q_{3}-Q_{1}$$"}, {"modulo": "M\u00f3dulo 1: Semana 3", "titulo": "Definici\u00f3n 5.1 (Dato Estandarizado - Z-score)", "contenido": "Para cada dato $x_{i}$, su versi\u00f3n estandarizada es: $$z_{i}=\\frac{x_{i}-\\overline{x}}{s}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Teorema 1.1 (Combinaciones Lineales de Normales)", "contenido": "Sean $X_{1},X_{2},...,X_{n}$ variables aleatorias independientes, donde $X_{i}\\sim N(\\mu_{i},\\sigma_{i}^{2})$. Sea $Y=b+\\sum_{i=1}^{n}a_{i}X_{i}$. Entonces $$Y\\sim N\\left(b+\\sum_{i=1}^{n}a_{i}\\mu_{i},\\sum_{i=1}^{n}a_{i}^{2}\\sigma_{i}^{2}\\right)$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Definici\u00f3n 1.1 (Funci\u00f3n Generadora de Momentos)", "contenido": "Sea $X$ una variable aleatoria, $$M_{X}(t)=\\mathbb{E}[e^{tX}]$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Teorema 1.2 (Propiedades de la FGM)", "contenido": "1. Teorema de Unicidad (identifica distribuciones).<br>2. Suma de Independientes: $M_{\\sum X_{i}}(t)=\\prod_{i=1}^{n}M_{X_{i}}(t)$."}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Definici\u00f3n 1.2 (Distribuci\u00f3n Chi-Cuadrada)", "contenido": "Sean $Z_{1},Z_{2},...,Z_{v}$ independientes, todas $N(0,1)$. La suma de sus cuadrados es: $$V=\\sum_{i=1}^{v}Z_{i}^{2}\\sim\\chi_{(v)}^{2}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Teorema 1.3 (Conexi\u00f3n Gamma)", "contenido": "La distribuci\u00f3n $\\chi_{(v)}^{2}$ es un caso especial de la familia Gamma: $$\\chi_{(v)}^{2}\\equiv Gamma(\\alpha=v/2,\\beta=1/2)$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Teorema 1.4 (Propiedad Aditiva de la Chi-Cuadrada)", "contenido": "Si $V_{1}\\sim\\chi_{(a)}^{2}$ y $V_{2}\\sim\\chi_{(b)}^{2}$ independientes, su suma es $$V_{1}+V_{2}\\sim\\chi_{(a+b)}^{2}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Definici\u00f3n 1.3 (Distribuci\u00f3n t de Student)", "contenido": "Sea $Z\\sim N(0,1)$ y $V\\sim\\chi_{(v)}^{2}$, independientes. Entonces $$T=\\frac{Z}{\\sqrt{V/v}}\\sim t_{(v)}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Definici\u00f3n 1.4 (Distribuci\u00f3n F de Snedecor)", "contenido": "Sean $V_{1}\\sim\\chi_{(v_{1})}^{2}$ y $V_{2}\\sim\\chi_{(v_{2})}^{2}$ independientes. Entonces $$F=\\frac{V_{1}/v_{1}}{V_{2}/v_{2}}\\sim F_{(v_{1},v_{2})}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Lema 1.1 (Propiedad Rec\u00edproca de la F)", "contenido": "Si $X\\sim F_{(v_{1},v_{2})}$, entonces $$\\frac{1}{X}\\sim F_{(v_{2},v_{1})}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Teorema 1.5 (Conexi\u00f3n Fundamental entre t y F)", "contenido": "Si $T\\sim t_{(v)}$, entonces $$T^{2}\\sim F_{(1,v)}$$"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Teorema 2.1 (Teorema de Fisher)", "contenido": "Sea $X_{1},X_{2},...,X_{n}$ una muestra aleatoria de una $N(\\mu,\\sigma^{2})$. Definimos $S^{2}=\\frac{1}{n-1}\\sum_{i=1}^{n}(X_{i}-\\overline{X})^{2}$. Entonces:<ol><li>$\\overline{X}\\sim N(\\mu,\\sigma^{2}/n)$.</li><li>$\\overline{X}$ y $S^{2}$ son independientes.</li><li>$\\frac{(n-1)S^{2}}{\\sigma^{2}}\\sim\\chi_{(n-1)}^{2}$.</li></ol>"}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Lema 2.1 (Independencia en la Normal Multivariada)", "contenido": "Si un vector $W$ tiene distribuci\u00f3n Normal Multivariada, subvectores con covarianza cero son independientes."}, {"modulo": "M\u00f3dulo 1: Semana 4", "titulo": "Lema 2.2 (Preservaci\u00f3n de Independencia)", "contenido": "Si $X$ y $Y$ son independientes, para funciones continuas $g$ y $h$, las variables $g(X)$ y $h(Y)$ tambi\u00e9n lo son."}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Definici\u00f3n 1.1 (El M\u00e1ximo y el M\u00ednimo)", "contenido": "Sea $X_{1},X_{2},...,X_{n}$ una muestra aleatoria i.i.d.. Definimos las estad\u00edsticas de orden extremas como el M\u00ednimo $X_{(1)}=\\min\\{X_{1},...,X_{n}\\}$ y el M\u00e1ximo $X_{(n)}=\\max\\{X_{1},...,X_{n}\\}$."}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Teorema 1.1 (Distribuci\u00f3n del M\u00e1ximo)", "contenido": "La CDF del m\u00e1ximo es $F_{X_{(n)}}(x)=[F(x)]^{n}$ y su funci\u00f3n de densidad (PDF) es: $$f_{X_{(n)}}(x)=n[F(x)]^{n-1}f(x)$$"}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Teorema 1.2 (Distribuci\u00f3n del M\u00ednimo)", "contenido": "La CDF del m\u00ednimo es $F_{X_{(1)}}(x)=1-[1-F(x)]^{n}$ y su PDF es: $$f_{X_{(1)}}(x)=n[1-F(x)]^{n-1}f(x)$$"}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Casos de Estabilidad vs Inestabilidad de los Extremos", "contenido": "<ul><li><b>Caso 1: Super-Estabilidad (Soporte Acotado):</b> El m\u00e1ximo converge al l\u00edmite real, su varianza decrece infinitamente r\u00e1pido a $O(1/n^{2})$.</li><li><b>Caso 2: Inestabilidad Creciente (Colas Exponenciales):</b> El m\u00e1ximo nunca deja de crecer. Su esperanza tiende a infinito y su varianza se estanca en una constante.</li><li><b>Caso 3: Inestabilidad Catastr\u00f3fica (Colas Pesadas):</b> Los valores extremos no sufren fricci\u00f3n, creciendo linealmente con $n$. No hay estabilidad posible.</li></ul>"}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Teorema 3.1 (Momentos Exactos de la ECDF)", "contenido": "La suma de indicadoras es una variable Binomial$(n,F(x))$. Para $\\hat{F}_{n}(x)$:<br> Insesgamiento $\\mathbb{E}[\\hat{F}_{n}(x)]=F(x)$ <br> Varianza $Var(\\hat{F}_{n}(x))=\\frac{F(x)(1-F(x))}{n}$."}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Definici\u00f3n 3.1 (El Principio de Sustituci\u00f3n - Plug-In)", "contenido": "Cualquier par\u00e1metro poblacional $\\theta$ puede verse como un Funcional $T(F)$. El Estimador Plug-In se obtiene sustituyendo la te\u00f3rica $F$ por la emp\u00edrica $\\hat{F}_{n}$: $$\\hat{\\theta}_{plugin}=T(\\hat{F}_{n})$$"}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Definici\u00f3n 3.2 (La Muestra Bootstrap)", "contenido": "Dada una muestra original observada $x=(x_{1},...,x_{n})$, una muestra Bootstrap $x^{*}$ es una nueva muestra de tama\u00f1o $n$ extra\u00edda con reemplazo del conjunto de datos original $x$."}, {"modulo": "M\u00f3dulo 1: Semana 5", "titulo": "Teorema 3.2 (Fracaso Emp\u00edrico - El Muro del Bootstrap)", "contenido": "El m\u00e9todo Bootstrap colapsa irremediablemente cuando intenta estimar distribuciones de extremos. La distribuci\u00f3n virtual es degenerada y subestima peligrosamente la inestabilidad de la cola derecha."}];
        const container = document.getElementById('cards-container');
        
        const originalOrder = Array.from({length: conceptos.length}, (_, i) => i);
        let currentOrder = [...originalOrder];

        function renderCards() {
            container.innerHTML = ''; 
            
            currentOrder.forEach((conceptoIndex) => {
                const concepto = conceptos[conceptoIndex];
                const card = document.createElement('div');
                card.className = 'card';
                
                card.innerHTML = `
                    <div class="card-header" onclick="toggleCard(${conceptoIndex})">
                        <span>${concepto.titulo}</span>
                        <span class="modulo-tag">${concepto.modulo}</span>
                    </div>
                    <div class="card-content" id="content-${conceptoIndex}">
                        ${concepto.contenido}
                    </div>
                `;
                container.appendChild(card);
            });

            if (window.MathJax) {
                MathJax.typesetPromise();
            }
        }

        function toggleCard(index) {
            const content = document.getElementById('content-' + index);
            if (content.style.display === 'block') {
                content.style.display = 'none';
            } else {
                content.style.display = 'block';
            }
        }

        function shuffleCards() {
            for (let i = currentOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentOrder[i], currentOrder[j]] = [currentOrder[j], currentOrder[i]];
            }
            renderCards();
        }

        function restoreOrder() {
            currentOrder = [...originalOrder];
            renderCards();
        }

        // Ejecutar directo en lugar de esperar a 'load'
        renderCards();

    </script>
</body>
</html>
